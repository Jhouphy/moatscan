name: 📊 Daily Stock Screener

on:
  schedule:
    - cron: "0 7 * * 1-5"
    - cron: "0 22 * * 1-5"
  workflow_dispatch:

jobs:
  run-all-screeners:
    name: 📈 執行全市場篩選
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - name: 📥 Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 📦 Install dependencies
        run: pip install yfinance pandas requests lxml html5lib beautifulsoup4

      - name: 🇹🇼 Run Taiwan screener
        run: python -u scripts/screener_tw.py

      - name: 🇺🇸 Run US screener
        run: python -u scripts/screener_us.py

      - name: 📤 Commit & push ALL results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/*.json
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "📊 自動篩選更新 $(date +'%Y-%m-%d')"
            git pull --rebase origin main
            git push
          else
            echo "沒有資料變動，跳過上傳。"
          fi

      # ── 失敗時自動開 Issue 通知 ─────────────────────────────────────────
      - name: 🚨 失敗通知（自動開 Issue）
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const today = new Date().toISOString().slice(0,10);
            const title = `🚨 篩選腳本執行失敗 ${today}`;
            const body  = [
              `## MoatScan 自動篩選失敗`,
              ``,
              `**時間：** ${new Date().toLocaleString('zh-TW', {timeZone:'Asia/Taipei'})}`,
              `**觸發方式：** ${{ github.event_name }}`,
              ``,
              `請前往 [Actions 頁面](https://github.com/${{ github.repository }}/actions) 查看詳細錯誤訊息。`,
              ``,
              `> 此 Issue 由 GitHub Actions 自動產生`,
            ].join('\n');

            // 檢查是否已有相同標題的 open issue，避免重複開
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              state: 'open',
              labels: 'screener-failure',
            });
            const dup = issues.data.find(i => i.title === title);
            if (!dup) {
              await github.rest.issues.create({
                owner:  context.repo.owner,
                repo:   context.repo.repo,
                title,
                body,
                labels: ['screener-failure'],
              });
            }
