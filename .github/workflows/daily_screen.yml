name: 📊 Daily Stock Screener

on:
  schedule:
    - cron: "0 7 * * 1-5"
    - cron: "0 22 * * 1-5"
  workflow_dispatch:

jobs:
  screen-tw:
    name: 🇹🇼 台股篩選
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install yfinance pandas requests requests-cache

      - name: Run Taiwan screener
        run: python scripts/screener_tw.py

      - name: Commit & push results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/tw_results.json
          git diff --staged --quiet || git commit -m "📊 台股篩選更新 $(date +'%Y-%m-%d')"
          git pull --rebase https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git HEAD:main
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git HEAD:main

  screen-us:
    name: 🇺🇸 美股篩選
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install yfinance pandas requests requests-cache lxml html5lib beautifulsoup4

      - name: Run US screener
        run: python scripts/screener_us.py

      - name: Commit & push results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/us_results.json
          git diff --staged --quiet || git commit -m "📊 美股篩選更新 $(date +'%Y-%m-%d')"
          git pull --rebase https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git HEAD:main
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git HEAD:main
