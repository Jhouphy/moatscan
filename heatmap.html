<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>MoatScan 熱力圖</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=Barlow+Condensed:wght@700;900&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:#080c18;color:#e8f0ff;font-family:'Noto Sans TC',sans-serif;font-size:14px;}
  button{cursor:pointer;font-family:'Noto Sans TC',sans-serif;}
  .mkt-btn{padding:6px 18px;border:1px solid #2a3a58;border-radius:7px;background:none;color:#6a8ab8;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:15px;transition:all 0.2s;}
  .mkt-btn.on{background:linear-gradient(135deg,#f0b90b,#d4941a);border-color:transparent;color:#080c18;}
  .mkt-btn:hover:not(.on){background:#1a2540;}
  #tooltip{position:fixed;background:#0d1120;border:1px solid #2a3a58;border-radius:10px;padding:12px 16px;font-size:12px;pointer-events:none;display:none;z-index:100;min-width:175px;color:#e8f0ff;box-shadow:0 4px 20px rgba(0,0,0,0.5);}
</style>
</head>
<body>
<div style="max-width:1200px;margin:0 auto;padding:20px 16px;">

  <!-- Header -->
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:12px;">
    <div style="display:flex;align-items:center;gap:14px;">
      <div style="width:32px;height:32px;background:linear-gradient(135deg,#f0b90b,#d4941a);border-radius:8px;display:flex;align-items:center;justify-content:center;">
        <span style="color:#080c18;font-size:16px;font-weight:700;">⬡</span>
      </div>
      <span style="font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:22px;letter-spacing:0.1em;">MOAT<span style="color:#f0b90b;">SCAN</span> <span style="font-size:15px;color:#4a5a7a;font-weight:400;letter-spacing:0;">熱力圖</span></span>
    </div>
    <a href="index.html" style="font-size:13px;color:#4a8aff;text-decoration:none;">← 回選股篩選</a>
  </div>

  <!-- Controls -->
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:10px;">
    <div style="display:flex;gap:8px;">
      <button class="mkt-btn on" id="bTW" onclick="app.mkt('TW')">🇹🇼 台股</button>
      <button class="mkt-btn" id="bUS" onclick="app.mkt('US')">🇺🇸 美股</button>
    </div>
    <div id="breadcrumb" style="font-size:13px;color:#6a8ab8;"></div>
    <div style="display:flex;gap:14px;font-size:12px;color:#4a5a7a;align-items:center;">
      <span style="display:flex;align-items:center;gap:5px;"><span style="display:inline-block;width:10px;height:10px;background:#993C1D;border-radius:2px;"></span>上漲</span>
      <span style="display:flex;align-items:center;gap:5px;"><span style="display:inline-block;width:10px;height:10px;background:#0F6E56;border-radius:2px;"></span>下跌</span>
      <span style="color:#3a4a6a;">方塊大小 = 市值</span>
    </div>
  </div>

  <!-- 板塊/主題標籤列 -->
  <div id="tagbar" style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px;min-height:28px;"></div>

  <!-- Canvas -->
  <div id="mapwrap" style="width:100%;border-radius:10px;overflow:hidden;background:#060a14;">
    <svg id="map" style="display:block;width:100%;"></svg>
  </div>

  <div style="display:flex;justify-content:space-between;margin-top:8px;font-size:11px;color:#2a3a58;">
    <span id="counter"></span>
    <span id="updated"></span>
  </div>
</div>

<div id="tooltip"></div>

// 概覽模式只顯示市值超過此門檻的股票（太小的格子沒意義）
// TW: 100億以上；US: 100億美元以上
const MIN_CAP = {TW: 10_000_000_000, US: 10_000_000_000};

const app = {
  M:'TW', S:null, T:null, cache:{TW:null,US:null},

  clFill(g){
    if(g>=3)  return '#6b1010';
    if(g>=1)  return '#993C1D';
    if(g>=0)  return '#c94e28';
    if(g>=-1) return '#1D9E75';
    if(g>=-3) return '#0F6E56';
    return '#085041';
  },
  clText(g){ return g>=0?'rgba(255,195,165,0.95)':'rgba(130,230,185,0.92)'; },
  pct(g){ return(g>=0?'+':'')+g.toFixed(2)+'%'; },
  cap(v,m){
    if(!v) return 'N/A';
    if(m==='TW') return (v/1e8).toFixed(0)+' 億';
    const b=v/1e9; return b>=1000?(v/1e12).toFixed(1)+'T':'$'+b.toFixed(0)+'B';
  },

  // 從 localStorage 讀合理價（與 index.html 共用同一 key）
  fairData(){
    try{ return JSON.parse(localStorage.getItem('moatscan_fairval_v1')||'{}'); }catch{ return {}; }
  },
  // PEG 法計算合理價燈號（與 index.html 邏輯一致）
  valLight(ticker, price){
    const saved = this.fairData()[ticker];
    if(!saved||!saved.type||!price) return null;
    const p=price;
    if(saved.type==='growth'){
      const eps=parseFloat(saved.eps)||0;
      const fvs=[
        saved.g3  ? eps*parseFloat(saved.g3)  : null,
        saved.g5  ? eps*parseFloat(saved.g5)  : null,
        saved.g10 ? eps*parseFloat(saved.g10) : null,
      ].filter(v=>v&&v>0);
      if(!fvs.length) return null;
      const lo=Math.min(...fvs), hi=Math.max(...fvs);
      return p<lo?'green':p<=hi?'yellow':'red';
    }
    if(saved.type==='dividend'){
      const div=parseFloat(saved.div)||0; if(!div) return null;
      const fv=div*25; return p<fv?'green':p<=fv*1.1?'yellow':'red';
    }
    if(saved.type==='asset'){
      const bvps=parseFloat(saved.bvps)||0; if(!bvps) return null;
      return p<bvps*0.8?'green':p<=bvps*1.2?'yellow':'red';
    }
    return null;
  },
  valEmoji(light){ return light==='green'?'🟢':light==='yellow'?'🟡':light==='red'?'🔴':null; },
  valLabel(light){ return light==='green'?'低估':light==='yellow'?'合理':light==='red'?'高估':null; },
  fmtFV(ticker){
    const saved=this.fairData()[ticker]; if(!saved||!saved.type) return null;
    const eps=parseFloat(saved.eps)||0;
    const labels=[];
    if(saved.type==='growth'){
      if(saved.g3)  labels.push('3年 $'+(eps*parseFloat(saved.g3)).toFixed(0));
      if(saved.g5)  labels.push('5年 $'+(eps*parseFloat(saved.g5)).toFixed(0));
      if(saved.g10) labels.push('10年 $'+(eps*parseFloat(saved.g10)).toFixed(0));
    } else if(saved.type==='dividend'){
      const div=parseFloat(saved.div)||0;
      if(div) labels.push('股息股 $'+(div*25).toFixed(0));
    } else if(saved.type==='asset'){
      const bvps=parseFloat(saved.bvps)||0;
      if(bvps) labels.push('資產股 $'+(bvps*0.8).toFixed(0));
    }
    return labels.length ? labels.join(' / ') : null;
  },

  async mkt(m){
    this.M=m; this.S=null;
    ['TW','US'].forEach(k=>document.getElementById('b'+k).classList.toggle('on',k===m));
    if(!this.cache[m]){
      document.getElementById('counter').textContent='載入中...';
      try{
        const r=await fetch(DATA_URLS[m]+'?t='+Date.now());
        if(r.ok){
          const d=await r.json();
          // change_pct 由 screener 每日計算，若缺則顯示 0（灰色）
          d.results.forEach(s=>{ if(s.change_pct==null) s.change_pct=0; });
          this.cache[m]=d;
        } else { this.cache[m]=DEMO[m]; }
      }catch(e){ this.cache[m]=DEMO[m]; }
    }
    this.draw();
  },

  back(){ this.S=null; this.T=null; this.draw(); },
  backToSector(){ this.T=null; this.draw(); },

  groupBySector(results){
    const map={};
    results.forEach(r=>{
      const s=r.sector||'其他';
      if(!map[s]) map[s]=[];
      map[s].push(r);
    });
    return Object.entries(map).map(([s,d])=>({s,d}));
  },

  draw(){
    const raw=this.cache[this.M];
    if(!raw) return;
    const isTW=this.M==='TW';
    const secs=this.groupBySector(raw.results);
    const svg=d3.select('#map');
    svg.selectAll('*').remove();
    const W=document.getElementById('mapwrap').clientWidth||800;
    const H=Math.max(500, Math.round(W*0.58));
    svg.attr('height',H);

    if(!this.S){
      // 全覽
      // 概覽：過濾掉太小的公司，只顯示有意義大小的格子
      const minCap = MIN_CAP[this.M]||0;
      const filteredSecs = secs.map(s=>({
        ...s, d: s.d.filter(r=>(r.market_cap||0)>=minCap)
      })).filter(s=>s.d.length>0);

      const root=d3.hierarchy({name:'r',children:filteredSecs.map(s=>({
        name: isTW?s.s:(SECTOR_ZH[s.s]||s.s),
        origName: s.s,
        children:s.d
      }))}).sum(d=>d.market_cap||0).sort((a,b)=>b.value-a.value);
      d3.treemap().size([W,H]).paddingOuter(5).paddingTop(24).paddingInner(1)(root);

      const secN=root.children||[];
      // 板塊底色框
      svg.selectAll('.sr').data(secN).enter().append('rect').attr('class','sr')
        .attr('x',d=>d.x0).attr('y',d=>d.y0)
        .attr('width',d=>d.x1-d.x0).attr('height',d=>d.y1-d.y0)
        .attr('rx',5).attr('fill','rgba(255,255,255,0.02)')
        .attr('stroke','rgba(255,255,255,0.08)').attr('stroke-width',1);
      // 板塊點擊區
      svg.selectAll('.sc').data(secN).enter().append('rect').attr('class','sc')
        .attr('x',d=>d.x0).attr('y',d=>d.y0)
        .attr('width',d=>d.x1-d.x0).attr('height',24)
        .attr('fill','transparent').style('cursor','pointer')
        .on('click',(e,d)=>{ app.S=d.data.origName||d.data.name; app.draw(); });
      // 板塊標籤
      svg.selectAll('.sl').data(secN).enter().append('text').attr('class','sl')
        .attr('x',d=>d.x0+7).attr('y',d=>d.y0+15)
        .attr('fill','rgba(255,255,255,0.6)').attr('font-size',11).attr('font-weight','500')
        .attr('font-family',"'Noto Sans TC',sans-serif").attr('pointer-events','none')
        .text(d=>{ const w=d.x1-d.x0; return w<40?'':w<90?d.data.name.slice(0,4):d.data.name; });

      this._tiles(svg,root.leaves(),W,H,false,isTW);
      document.getElementById('breadcrumb').innerHTML='<span style="color:#4a5a7a">全部板塊</span>';
      document.getElementById('counter').textContent=root.leaves().length+' 支（市值門檻以上）';
      document.getElementById('updated').textContent='更新：'+raw.updated;
      // 渲染板塊標籤列（顯示漲跌數）
      this._renderTagBar(filteredSecs, isTW, null, null);

    } else if(this.S && this.T) {
      // 第三層：板塊內的主題篩選
      const sec=secs.find(s=>s.s===this.S);
      if(!sec) return;
      const themed=sec.d.filter(s=>(s.themes||[]).includes(this.T));
      if(!themed.length){ this.T=null; this.draw(); return; }
      const root=d3.hierarchy({name:'r',children:themed}).sum(d=>d.market_cap||0).sort((a,b)=>b.value-a.value);
      d3.treemap().size([W,H]).padding(3)(root);
      this._tiles(svg,root.leaves(),W,H,true,isTW);
      const secLabel=isTW?sec.s:(SECTOR_ZH[sec.s]||sec.s);
      document.getElementById('breadcrumb').innerHTML=
        '<span onclick="app.back()" style="cursor:pointer;color:#4a8aff">全部板塊</span>'
        +' <span style="color:#2a3a58"> › </span>'
        +'<span onclick="app.backToSector()" style="cursor:pointer;color:#4a8aff">'+secLabel+'</span>'
        +' <span style="color:#2a3a58"> › </span>'
        +'<span style="background:#f0b90b18;color:#f0b90b;padding:2px 8px;border-radius:4px;font-size:12px;">'+this.T+'</span>';
      document.getElementById('counter').textContent=this.T+' · '+themed.length+' 支';
      document.getElementById('updated').textContent='更新：'+raw.updated;
      document.getElementById('tagbar').innerHTML='';

    } else {
      // 第二層：展開單一板塊 + 顯示主題標籤
      const sec=secs.find(s=>s.s===this.S);
      if(!sec) return;
      const root=d3.hierarchy({name:'r',children:sec.d}).sum(d=>d.market_cap||0).sort((a,b)=>b.value-a.value);
      d3.treemap().size([W,H]).padding(3)(root);

      // 計算此板塊有哪些主題，並依出現次數排序
      const themeCounts={};
      sec.d.forEach(s=>(s.themes||[]).forEach(t=>{ themeCounts[t]=(themeCounts[t]||0)+1; }));
      const themes=Object.entries(themeCounts).sort((a,b)=>b[1]-a[1]);

      const secLabel=isTW?sec.s:(SECTOR_ZH[sec.s]||sec.s);

      // treemap 佔滿全高（標籤列已移到上方 HTML tagbar）
      d3.treemap().size([W, H]).padding(3)(root);
      this._tiles(svg,root.leaves(),W,H,true,isTW);

      document.getElementById('breadcrumb').innerHTML=
        '<span onclick="app.back()" style="cursor:pointer;color:#4a8aff">全部板塊</span>'
        +' <span style="color:#2a3a58"> › </span>'
        +'<span style="color:#e8f0ff">'+secLabel+'</span>';
      document.getElementById('counter').textContent=secLabel+' · '+sec.d.length+' 支';
      document.getElementById('updated').textContent='更新：'+raw.updated;
      // 渲染主題標籤列
      this._renderTagBar(null, isTW, sec, null);
    }
    document.getElementById('tooltip').style.display='none';
  },

  // 渲染標籤列
  // secs: 板塊陣列（概覽用）; sec: 單一板塊（板塊內主題用）
  _renderTagBar(secs, isTW, sec, activeTheme){
    const bar = document.getElementById('tagbar');
    bar.innerHTML = '';
    const self = this;

    if(secs){
      // 概覽：顯示各板塊，帶漲跌數
      secs.forEach(s=>{
        const label = isTW ? s.s : (SECTOR_ZH[s.s]||s.s);
        const up   = s.d.filter(r=>(r.change_pct||0)>0).length;
        const down = s.d.filter(r=>(r.change_pct||0)<0).length;
        const btn  = document.createElement('button');
        btn.style.cssText='background:#0d1120;border:1px solid #1e2840;border-radius:7px;padding:4px 10px;cursor:pointer;display:flex;align-items:center;gap:5px;font-size:12px;color:#c8d8f0;font-family:"Noto Sans TC",sans-serif;white-space:nowrap;transition:background 0.15s;';
        btn.innerHTML=`<span>${label}</span>`
          +(up?`<span style="color:#ff8866;font-size:11px;">${up}🔴</span>`:'')
          +(down?`<span style="color:#44cc88;font-size:11px;">${down}🟢</span>`:'');
        btn.onmouseover=()=>btn.style.background='#1a2540';
        btn.onmouseout=()=>btn.style.background='#0d1120';
        btn.onclick=()=>{ self.S=s.s; self.T=null; self.draw(); };
        bar.appendChild(btn);
      });
    } else if(sec){
      // 板塊內：顯示主題標籤，帶漲跌數
      const themeCounts={};
      sec.d.forEach(s=>(s.themes||[]).forEach(t=>{
        if(!themeCounts[t]) themeCounts[t]={up:0,down:0};
        if((s.change_pct||0)>0) themeCounts[t].up++;
        else if((s.change_pct||0)<0) themeCounts[t].down++;
      }));
      const themes=Object.entries(themeCounts).sort((a,b)=>(b[1].up+b[1].down)-(a[1].up+a[1].down));
      if(!themes.length){
        bar.innerHTML='<span style="font-size:11px;color:#3a4a6a;">（此板塊尚無主題標籤，重跑 screener 後出現）</span>';
        return;
      }
      themes.forEach(([t,cnt])=>{
        const isActive = activeTheme===t;
        const btn = document.createElement('button');
        btn.style.cssText=`background:${isActive?'#f0b90b18':'#0d1120'};border:1px solid ${isActive?'#f0b90b':'#1e2840'};border-radius:7px;padding:4px 10px;cursor:pointer;display:flex;align-items:center;gap:5px;font-size:12px;color:${isActive?'#f0b90b':'#c8d8f0'};font-family:"Noto Sans TC",sans-serif;white-space:nowrap;transition:all 0.15s;`;
        btn.innerHTML=`<span>${t}</span>`
          +(cnt.up?`<span style="color:#ff8866;font-size:11px;">${cnt.up}🔴</span>`:'')
          +(cnt.down?`<span style="color:#44cc88;font-size:11px;">${cnt.down}🟢</span>`:'');
        btn.onmouseover=()=>{ if(!isActive) btn.style.background='#1a2540'; };
        btn.onmouseout=()=>{ if(!isActive) btn.style.background='#0d1120'; };
        btn.onclick=()=>{ self.T=t; self.draw(); };
        bar.appendChild(btn);
      });
    }
  },

  _tiles(svg,leaves,W,H,big,isTW){
    const self=this;
    const g=svg.selectAll('.tg').data(leaves).enter().append('g').attr('class','tg');

    g.append('rect')
      .attr('x',d=>d.x0).attr('y',d=>d.y0)
      .attr('width',d=>Math.max(0,d.x1-d.x0)).attr('height',d=>Math.max(0,d.y1-d.y0))
      .attr('rx',big?3:2)
      .attr('fill',d=>self.clFill(d.data.change_pct||0))
      .attr('stroke','rgba(6,10,20,0.6)').attr('stroke-width',0.5)
      .style('cursor','pointer')
      .on('mouseenter',function(e,d){
        d3.select(this).attr('stroke','rgba(255,255,255,0.4)').attr('stroke-width',1.5);
        const tip=document.getElementById('tooltip');
        const g2=d.data.change_pct||0;
        const gc=g2>=0?'#f07850':'#40d090';
        const name=isTW?d.data.name:(d.data.name||d.data.ticker);
        const light=self.valLight(d.data.ticker, d.data.price);
        const fvStr=self.fmtFV(d.data.ticker);
        const priceStr=d.data.price?'$'+d.data.price:'N/A';
        tip.style.display='block';
        tip.innerHTML=
          '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:2px;">'
            +'<span style="font-size:15px;font-weight:500;color:#e8f0ff;">'+d.data.ticker.replace('.TW','').replace('.TWO','')+'</span>'
            +(light?'<span style="font-size:18px;">'+self.valEmoji(light)+'</span>':'')
          +'</div>'
          +'<div style="color:#aabbcc;font-size:12px;margin-bottom:8px;">'+name+'</div>'
          +'<div style="color:'+gc+';font-size:19px;font-weight:500;margin-bottom:6px;">'+self.pct(g2)+'</div>'
          +'<div style="color:#6a8ab8;font-size:11px;margin-bottom:2px;">現價 <span style="color:#c8d8f0;">'+priceStr+'</span>'
            +(light?' &nbsp;·&nbsp; <span style="color:'+(light==='red'?'#ff8866':light==='yellow'?'#ffd060':'#44cc88')+';">'+self.valLabel(light)+'</span>':'')+'</div>'
          +(fvStr?'<div style="color:#5a7a9a;font-size:11px;margin-bottom:2px;">合理價 '+fvStr+'</div>':'')
          +'<div style="color:#6a8ab8;font-size:11px;margin-bottom:2px;">市值 '+self.cap(d.data.market_cap,self.M)+'</div>'
          +'<div style="color:#6a8ab8;font-size:11px;">財務評分 <span style="color:#c8d8f0;">'+d.data.fin_score+'/6</span></div>'
          +(!light?'<div style="color:#3a4a6a;font-size:10px;margin-top:6px;border-top:1px solid #1a2540;padding-top:5px;">在選股頁設定合理價後可顯示燈號</div>':'');
      })
      .on('mousemove',function(e){
        const tip=document.getElementById('tooltip');
        let x=e.clientX+16,y=e.clientY+16;
        if(x+190>window.innerWidth)  x=e.clientX-200;
        if(y+130>window.innerHeight) y=e.clientY-140;
        tip.style.left=x+'px'; tip.style.top=y+'px';
      })
      .on('mouseleave',function(){
        d3.select(this).attr('stroke','rgba(6,10,20,0.6)').attr('stroke-width',0.5);
        document.getElementById('tooltip').style.display='none';
      });

    // 文字
    g.each(function(d){
      const tw=d.x1-d.x0, th=d.y1-d.y0;
      if(tw<18||th<14) return;
      const cx=d.x0+tw/2, cy=d.y0+th/2;
      const el=d3.select(this);
      const g2=d.data.change_pct||0;
      const tick=d.data.ticker.replace('.TW','').replace('.TWO','');
      const name=isTW?d.data.name:(d.data.name||'');
      const pctStr=self.pct(g2);

      // 字型大小：依方塊面積動態決定
      const area=tw*th;
      const fsTick=Math.max(11,Math.min(big?20:16, tw/3.2, th/2.5));
      const fsPct=Math.max(10,fsTick*0.85);
      const fsName=Math.max(10,fsTick*0.78);

      const canPct  = th > fsTick+fsPct+8  && tw>36;
      const canName = th > fsTick+fsPct+fsName+14 && tw>46;

      // 合理價燈號小圓點（右上角）
      const light=self.valLight(d.data.ticker, d.data.price);
      if(light && tw>30 && th>22){
        const dotColor=light==='green'?'#2ecc71':light==='yellow'?'#f0c040':'#e05030';
        el.append('circle')
          .attr('cx',d.x1-5).attr('cy',d.y0+5).attr('r',3.5)
          .attr('fill',dotColor).attr('opacity',0.9).attr('pointer-events','none');
      }

      const rows=[];
      rows.push({txt:tick,   fs:fsTick, color:'rgba(255,255,255,0.95)', w:500});
      if(canPct)  rows.push({txt:pctStr, fs:fsPct, color:self.clText(g2), w:400});
      if(canName && name){
        const shortName = name.length>6 ? name.slice(0,5)+'…' : name;
        rows.push({txt:shortName, fs:fsName, color:'rgba(255,255,255,0.65)', w:400});
      }

      const gap=4;
      const totalH=rows.reduce((s,r,i)=>s+r.fs+(i>0?gap:0),0);
      let y=cy - totalH/2;

      rows.forEach(r=>{
        el.append('text')
          .attr('x',cx).attr('y',y+r.fs*0.5)
          .attr('text-anchor','middle').attr('dominant-baseline','middle')
          .attr('fill',r.color).attr('font-size',r.fs).attr('font-weight',r.w)
          .attr('font-family',"'Noto Sans TC','Barlow Condensed',sans-serif")
          .attr('pointer-events','none')
          .text(r.txt);
        y+=r.fs+gap;
      });
    });
  }
};

// 啟動
app.mkt('TW');

// 視窗縮放重繪
let resizeTimer;
window.addEventListener('resize',()=>{
  clearTimeout(resizeTimer);
  resizeTimer=setTimeout(()=>app.draw(),150);
});
</script>
