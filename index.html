<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MoatScan 選股系統 - 修復版</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=Barlow+Condensed:wght@600;700;900&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #080c18; color: #e8f0ff; font-family: 'Noto Sans TC', sans-serif; font-size: 15px; overflow-x: hidden; }
  .container { max-width: 800px; margin: 0 auto; padding: 20px; }
  /* 下方為簡約樣式 */
  .card { background: #111827; border-radius: 12px; padding: 16px; margin-bottom: 12px; border: 1px solid #1f2937; }
  .flex-between { display: flex; justify-content: space-between; align-items: center; }
  .btn { padding: 8px 16px; border-radius: 6px; border: none; font-weight: 600; transition: 0.2s; }
  .btn-primary { background: #3b82f6; color: white; }
  .btn-outline { background: transparent; border: 1px solid #3b82f6; color: #3b82f6; }
  input { background: #1f2937; border: 1px solid #374151; color: white; padding: 10px; border-radius: 6px; width: 100%; margin-bottom: 10px; }
  #errdisplay { display: none; background: #450a0a; color: #fca5a5; padding: 15px; font-family: monospace; font-size: 12px; white-space: pre-wrap; margin: 10px; border-radius: 8px; border: 1px solid #991b1b; }
</style>
</head>
<body>

<div id="errdisplay"></div>
<div id="root"></div>

<script type="text/babel">
// --- 核心設定 (JSONBin) ---
// 如果你已經有目錄 ID，請填入下方，否則第一次建立帳號後請記下控制台輸出的 ID
const MASTER_DIR_ID = ""; 
const API_KEY = "$2a$10$8q1eGlnc8z3jKVjS3uTB3u1fp.h5mB1mq.xJXD08NsUZydQCx02im"; // 請記得填入你的 JSONbin API Key

// --- 全局錯誤捕捉 (修正換行語法錯誤) ---
window.onerror = (msg, src, line, col, err) => {
  const d = document.getElementById('errdisplay');
  if(d) { d.style.display='block'; d.textContent = `JS ERROR:\n${msg}\nLine: ${line}\nStack: ${err?.stack || ''}`; }
  return false;
};

// --- React 元件 ---
const { useState, useEffect, useMemo } = React;

function App() {
  const [session, setSession] = useState(null);
  const [data, setData] = useState(null);
  const [market, setMarket] = useState('TW');
  const [loading, setLoading] = useState(true);

  // 初始化檢查登入狀態
  useEffect(() => {
    const saved = localStorage.getItem('moatscan_session');
    if (saved) setSession(JSON.parse(saved));
    fetchData();
  }, [market]);

  async function fetchData() {
    setLoading(true);
    try {
      const url = market === 'TW' ? './data/tw_results.json' : './data/us_results.json';
      const res = await fetch(url);
      const json = await res.json();
      setData(json);
    } catch (e) {
      console.error("載入資料失敗", e);
    }
    setLoading(false);
  }

  const handleLogout = () => {
    localStorage.removeItem('moatscan_session');
    setSession(null);
    alert("已登出");
  };

  return (
    <div className="container">
      <header className="flex-between" style={{marginBottom: 30}}>
        <h1 style={{fontSize: 24, fontWeight: 900, color: '#60a5fa'}}>MOATSCAN</h1>
        <div>
          {session ? (
            <div style={{textAlign: 'right'}}>
              <span style={{fontSize: 13, marginRight: 10, color: '#94a3b8'}}>{session.nickname}</span>
              <button className="btn btn-outline" onClick={handleLogout} style={{fontSize: 12, padding: '4px 8px'}}>登出</button>
            </div>
          ) : (
            <button className="btn btn-primary" onClick={() => window.location.hash = 'login'}>登入/註冊</button>
          )}
        </div>
      </header>

      {/* 市場切換 */}
      <div style={{marginBottom: 20, display: 'flex', gap: 10}}>
        <button onClick={() => setMarket('TW')} className={`btn ${market==='TW'?'btn-primary':'btn-outline'}`}>台股</button>
        <button onClick={() => setMarket('US')} className={`btn ${market==='US'?'btn-primary':'btn-outline'}`}>美股</button>
      </div>

      {loading ? <div>載入中...</div> : (
        <div>
          {data?.results?.map(stock => (
            <div key={stock.ticker} className="card flex-between">
              <div>
                <div style={{fontWeight: 700}}>{stock.name || stock.ticker}</div>
                <div style={{fontSize: 12, color: '#64748b'}}>{stock.ticker} · {stock.sector}</div>
              </div>
              <div style={{textAlign: 'right'}}>
                <div style={{color: '#10b981', fontWeight: 900}}>{stock.fin_score} / 6</div>
                <div style={{fontSize: 12}}>${stock.price}</div>
              </div>
            </div>
          ))}
        </div>
      )}

      {/* 簡易登入視窗邏輯 */}
      <LoginModal isOpen={window.location.hash === '#login'} onLogin={(user) => {
        setSession(user);
        localStorage.setItem('moatscan_session', JSON.stringify(user));
        window.location.hash = '';
      }} />
    </div>
  );
}

function LoginModal({ isOpen, onLogin }) {
  if (!isOpen) return null;
  const [isRegister, setIsRegister] = useState(false);
  const [handle, setHandle] = useState(''); // 例如 jhouphy#1234
  const [pwd, setPwd] = useState('');

  const handleSubmit = async () => {
    if (!handle.includes('#')) return alert("格式請使用：名字#代碼 (例: user#1234)");
    alert("正在連線至資料庫... (這裡需串接 JSONbin 邏輯)");
    // 這裡實作時，如果是新用戶則 create bin，舊用戶則讀取 bin
    // 為簡化說明，我們先模擬成功
    onLogin({ nickname: handle, binId: 'dummy-id' });
  };

  return (
    <div style={{position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.8)', display: 'flex', alignItems: 'center', justifyContent: 'center', zIndex: 100}}>
      <div className="card" style={{width: 320, background: '#1f2937'}}>
        <h3>{isRegister ? '註冊帳號' : '會員登入'}</h3>
        <p style={{fontSize: 12, color: '#94a3b8', margin: '10px 0'}}>輸入暱稱與代號 (例: jhouphy#1234)</p>
        <input placeholder="帳號名稱#四位數字" value={handle} onChange={e => setHandle(e.target.value)} />
        <input type="password" placeholder="密碼" value={pwd} onChange={e => setPwd(e.target.value)} />
        <button className="btn btn-primary" style={{width: '100%', marginTop: 10}} onClick={handleSubmit}>
          {isRegister ? '建立帳號' : '立即登入'}
        </button>
        <button className="btn" style={{width: '100%', color: '#94a3b8', fontSize: 13}} onClick={() => setIsRegister(!isRegister)}>
          {isRegister ? '已有帳號？去登入' : '沒有帳號？去註冊'}
        </button>
        <button onClick={() => window.location.hash = ''} style={{marginTop: 20, color: '#ef4444', border: 'none', background: 'none', width: '100%'}}>取消</button>
      </div>
    </div>
  );
}

// --- 錯誤邊界元件 (修正換行語法錯誤) ---
class ErrorBoundary extends React.Component {
  state = { err: null };
  static getDerivedStateFromError(err) { return { err }; }
  componentDidCatch(e, info) {
    const d = document.getElementById('errdisplay');
    if(d) { d.style.display='block'; d.textContent = `REACT ERROR:\n${e.message}\n${e.stack}\n\nComponent:${info.componentStack}`; }
  }
  render() {
    if(this.state.err) return <div style={{padding: 20, color: 'red'}}>渲染出錯，請檢查控制台。</div>;
    return this.props.children;
  }
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<ErrorBoundary><App /></ErrorBoundary>);
</script>

</body>
</html>
