  if(mkt==="TW")return(v/1e8).toFixed(0)+" 億";

// ── localStorage 工具 ─────────────────────────────────────────────────────
const LS_KEY      = "moatscan_watchlist_v1";
const LS_SESSION  = "moatscan_session_v1";   // { binId, nickname, pwHash, isPublic }
const loadWatchlist = () => { try { return JSON.parse(localStorage.getItem(LS_KEY)||"[]"); } catch { return []; } };
const saveWatchlist = list => { try { localStorage.setItem(LS_KEY, JSON.stringify(list)); } catch {} };
const loadSession   = () => { try { return JSON.parse(localStorage.getItem(LS_SESSION)||"null"); } catch { return null; } };
const saveSession   = s  => { try { localStorage.setItem(LS_SESSION, JSON.stringify(s)); } catch {} };

// ── JSONBin API ────────────────────────────────────────────────────────────
const JBIN_KEY = "$2a$10$8q1eGlnc8z3jKVjS3uTB3u1fp.h5mB1mq.xJXD08NsUZydQCx02im";
const JBIN_URL = "https://api.jsonbin.io/v3/b";
// 目錄 Bin：儲存 "nickname#code" → binId 的對照表（第一次建帳號時自動建立）
const LS_DIR = "moatscan_dir_binid";  // localStorage key 存目錄 bin 的 ID

async function jbinCreate(data, isPrivate=false, name="moatscan") {
  const r = await fetch(JBIN_URL, {
    method:"POST",
    headers:{"Content-Type":"application/json","X-Access-Key":JBIN_KEY,
              "X-Bin-Name":name,"X-Bin-Private":isPrivate?"true":"false"},
    body: JSON.stringify(data),
  });
  const j = await r.json();
  return j.metadata?.id || null;
}
async function jbinRead(binId) {
  const r = await fetch(`${JBIN_URL}/${binId}/latest`, {headers:{"X-Access-Key":JBIN_KEY}});
  const j = await r.json();
  return j.record || null;
}
async function jbinUpdate(binId, data) {
  const r = await fetch(`${JBIN_URL}/${binId}`, {
    method:"PUT",
    headers:{"Content-Type":"application/json","X-Access-Key":JBIN_KEY},
    body: JSON.stringify(data),
  });
  return r.ok;
}

// 取得或建立目錄 Bin
async function getOrCreateDir() {
  let dirId = localStorage.getItem(LS_DIR);
  if (dirId) return dirId;
  // 第一次：自動建立一個公開的目錄 bin
  dirId = await jbinCreate({}, false, "moatscan-directory");
  if (dirId) localStorage.setItem(LS_DIR, dirId);
  return dirId;
}

// 產生 4 位數字代碼
function genCode() {
  return String(Math.floor(1000 + Math.random() * 9000));
}

// SHA-256
async function sha256(str) {
  if (!str) return "";
  const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,"0")).join("");
}

// ── 帳號 Modal ─────────────────────────────────────────────────────────────
function AccountModal({ onClose, session, onLogin, onLogout }) {
  const [tab, setTab]             = useState(session ? "info" : "login");
  const [nickname, setNickname]   = useState("");
  const [password, setPassword]   = useState("");
  const [isPublic, setIsPublic]   = useState(true);
  const [loginCode, setLoginCode] = useState("");  // "Jhouphy#1234" 格式
  const [loading, setLoading]     = useState(false);
  const [msg, setMsg]             = useState(null);
  const [copied, setCopied]       = useState(false);
  // 編輯設定用
  const [editPublic, setEditPublic]   = useState(session?.isPublic ?? true);
  const [editPw, setEditPw]           = useState("");
  const [savingSettings, setSaving]   = useState(false);

  const showMsg = (text, err=false) => setMsg({text, err});

  // 建立帳號
  const handleCreate = async () => {
    const nick = nickname.trim();
    if (!nick) return showMsg("請輸入暱稱", true);
    setLoading(true); setMsg(null);
    try {
      const pwHash = await sha256(password);
      const code   = genCode();
      const key    = `${nick.toLowerCase()}#${code}`;

      // 1. 建立使用者 bin
      const userData = {
        nickname: nick, code, isPublic, pwHash,
        watchlist: loadWatchlist(),
        fairval:   loadFairData(),
        createdAt: new Date().toISOString(),
      };
      const binId = await jbinCreate(userData, !isPublic, `moatscan-${nick}`);
      if (!binId) throw new Error("建立 bin 失敗");

      // 2. 更新目錄
      const dirId  = await getOrCreateDir();
      const dirRec = await jbinRead(dirId) || {};
      dirRec[key]  = binId;
      await jbinUpdate(dirId, dirRec);

      // 3. 儲存 session
      const sess = { binId, nickname:nick, code, pwHash, isPublic };
      localStorage.setItem(LS_SESSION, JSON.stringify(sess));
      onLogin(sess, userData.watchlist, userData.fairval);
      setTab("info");
      showMsg(`✓ 帳號建立成功！登入代碼：${nick}#${code}`);
    } catch(e) {
      showMsg("建立失敗：" + e.message, true);
    } finally { setLoading(false); }
  };

  // 登入（輸入 Jhouphy#1234 格式）
  const handleLogin = async () => {
    const raw = loginCode.trim();
    if (!raw) return showMsg("請輸入登入代碼", true);
    setLoading(true); setMsg(null);
    try {
      // 支援 "Jhouphy#1234" 或 "Jhouphy 1234" 或 "Jhouphy1234"
      const match = raw.match(/^(.+?)[#\s]?(\d{4})$/);
      if (!match) throw new Error("格式錯誤，請輸入「暱稱#4位數字」");
      const nick = match[1].trim().toLowerCase();
      const code = match[2];
      const key  = `${nick}#${code}`;

      const dirId = await getOrCreateDir();
      if (!dirId) throw new Error("找不到帳號目錄");
      const dirRec = await jbinRead(dirId);
      if (!dirRec || !dirRec[key]) throw new Error("找不到此帳號，請確認暱稱和數字是否正確");

      const binId = dirRec[key];
      const rec   = await jbinRead(binId);
      if (!rec) throw new Error("帳號資料讀取失敗");

      if (rec.pwHash) {
        const inputHash = await sha256(password);
        if (inputHash !== rec.pwHash) throw new Error("密碼錯誤");
      }

      const sess = { binId, nickname:rec.nickname, code:rec.code||code, pwHash:rec.pwHash, isPublic:rec.isPublic };
      localStorage.setItem(LS_SESSION, JSON.stringify(sess));
      onLogin(sess, rec.watchlist||[], rec.fairval||{});
      setEditPublic(rec.isPublic);
      showMsg("✓ 登入成功！");
      setTimeout(onClose, 700);
    } catch(e) {
      showMsg(e.message, true);
    } finally { setLoading(false); }
  };

  // 上傳到雲端
  const handleSync = async () => {
    setLoading(true); setMsg(null);
    try {
      const prev = await jbinRead(session.binId) || {};
      await jbinUpdate(session.binId, {
        ...prev, watchlist:loadWatchlist(), fairval:loadFairData(),
        syncedAt: new Date().toISOString(),
      });
      showMsg("✓ 已上傳到雲端！");
    } catch(e) { showMsg("上傳失敗："+e.message, true); }
    finally { setLoading(false); }
  };

  // 從雲端拉取
  const handlePull = async () => {
    setLoading(true); setMsg(null);
    try {
      const rec = await jbinRead(session.binId);
      if (rec?.watchlist) { saveWatchlist(rec.watchlist); onLogin(session, rec.watchlist, rec.fairval||{}); }
      showMsg("✓ 已從雲端拉取！");
    } catch(e) { showMsg("拉取失敗："+e.message, true); }
    finally { setLoading(false); }
  };

  // 儲存設定（公私密切換 + 改密碼）
  const handleSaveSettings = async () => {
    setSaving(true); setMsg(null);
    try {
      const prev    = await jbinRead(session.binId) || {};
      const newHash = editPw ? await sha256(editPw) : prev.pwHash;
      await jbinUpdate(session.binId, {...prev, isPublic:editPublic, pwHash:newHash});
      const newSess = {...session, isPublic:editPublic, pwHash:newHash};
      localStorage.setItem(LS_SESSION, JSON.stringify(newSess));
      onLogin(newSess, null, null);
      showMsg("✓ 設定已儲存！");
      setEditPw("");
    } catch(e) { showMsg("儲存失敗："+e.message, true); }
    finally { setSaving(false); }
  };

  const copyCode = () => {
    if (!session) return;
    navigator.clipboard.writeText(`${session.nickname}#${session.code}`)
      .then(()=>{ setCopied(true); setTimeout(()=>setCopied(false),2000); });
  };

  const inputStyle = {width:"100%",background:"#080c18",border:"1px solid #2a3a58",borderRadius:8,
    padding:"10px 14px",color:"#e8f0ff",fontSize:14,boxSizing:"border-box"};
  const btnPrimary = {width:"100%",padding:"12px",background:"linear-gradient(135deg,#f0b90b,#d4941a)",
    border:"none",borderRadius:8,color:"#080c18",fontWeight:700,fontSize:15,cursor:"pointer"};

  return (
    <div onClick={onClose} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.88)",zIndex:1000,display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
      <div onClick={e=>e.stopPropagation()} style={{background:"#0d1120",border:"1px solid #2a3a58",borderRadius:16,width:"100%",maxWidth:440,padding:24,maxHeight:"90vh",overflowY:"auto"}}>

        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
          <div style={{fontSize:18,fontWeight:700,color:"#e8f0ff"}}>☁️ 雲端帳號</div>
          <button onClick={onClose} style={{background:"none",border:"none",color:"#4a5a7a",fontSize:20,cursor:"pointer"}}>✕</button>
        </div>

        {/* Tabs（未登入） */}
        {!session && (
          <div style={{display:"flex",gap:4,marginBottom:20,background:"#080c18",borderRadius:8,padding:4}}>
            {[["login","登入"],["create","建立帳號"]].map(([id,lb])=>(
              <button key={id} onClick={()=>setTab(id)}
                style={{flex:1,padding:"8px 0",background:tab===id?"#1a2540":"transparent",border:"none",
                  borderRadius:6,color:tab===id?"#e8f0ff":"#4a5a7a",fontSize:14,cursor:"pointer",fontWeight:tab===id?600:400}}>
                {lb}
              </button>
            ))}
          </div>
        )}

        {/* 登入 */}
        {tab==="login" && !session && (
          <div style={{display:"flex",flexDirection:"column",gap:12}}>
            <div>
              <div style={{fontSize:12,color:"#6a8ab8",marginBottom:6}}>登入代碼</div>
              <input value={loginCode} onChange={e=>setLoginCode(e.target.value)}
                placeholder="例：Jhouphy#1234" style={inputStyle}
                onKeyDown={e=>e.key==="Enter"&&handleLogin()} />
              <div style={{fontSize:11,color:"#4a5a7a",marginTop:4}}>格式：暱稱＋井號＋4位數字</div>
            </div>
            <div>
              <div style={{fontSize:12,color:"#6a8ab8",marginBottom:6}}>密碼（若無則留空）</div>
              <input type="password" value={password} onChange={e=>setPassword(e.target.value)}
                placeholder="輸入密碼" style={inputStyle}
                onKeyDown={e=>e.key==="Enter"&&handleLogin()} />
            </div>
            <button onClick={handleLogin} disabled={loading} style={{...btnPrimary,opacity:loading?0.6:1}}>
              {loading?"登入中...":"登入"}
            </button>
          </div>
        )}

        {/* 建立帳號 */}
        {tab==="create" && !session && (
          <div style={{display:"flex",flexDirection:"column",gap:12}}>
            <div>
              <div style={{fontSize:12,color:"#6a8ab8",marginBottom:6}}>暱稱</div>
              <input value={nickname} onChange={e=>setNickname(e.target.value)}
                placeholder="例：老李 / Jhouphy" style={inputStyle} />
              <div style={{fontSize:11,color:"#4a5a7a",marginTop:4}}>系統會自動產生 4 位數字，例如 Jhouphy#1234</div>
            </div>
            <div>
              <div style={{fontSize:12,color:"#6a8ab8",marginBottom:6}}>密碼（可留空）</div>
              <input type="password" value={password} onChange={e=>setPassword(e.target.value)}
                placeholder="選填，無特定格式要求" style={inputStyle} />
            </div>
            <label style={{display:"flex",alignItems:"center",gap:10,cursor:"pointer",padding:"10px 12px",background:"#080c18",borderRadius:8}}>
              <input type="checkbox" checked={isPublic} onChange={e=>setIsPublic(e.target.checked)}
                style={{accentColor:"#f0b90b",width:16,height:16}} />
              <div>
                <div style={{fontSize:14,color:"#c0d0e8"}}>{isPublic?"🌐 公開帳號":"🔒 私密帳號"}</div>
                <div style={{fontSize:11,color:"#4a5a7a",marginTop:2}}>
                  {isPublic?"觀察清單可被他人查看":"僅自己可查看"}
                </div>
              </div>
            </label>
            <div style={{fontSize:12,color:"#4a5a7a",background:"#080c18",borderRadius:8,padding:10}}>
              💡 建立時會自動將目前裝置的觀察清單同步到雲端
            </div>
            <button onClick={handleCreate} disabled={loading} style={{...btnPrimary,opacity:loading?0.6:1}}>
              {loading?"建立中...":"建立帳號"}
            </button>
          </div>
        )}

        {/* 已登入 */}
        {session && (

// ── 合理價計算區塊 ────────────────────────────────────────────────────────
const LS_FAIR = "moatscan_fairval_v1";
const loadFairData = () => { try { return JSON.parse(localStorage.getItem(LS_FAIR)||"{}"); } catch { return {}; } };
const saveFairData = (ticker, data) => {
  try {
    const all = loadFairData();
    all[ticker] = data;
    localStorage.setItem(LS_FAIR, JSON.stringify(all));
  } catch {}
};

function calcFairValue(type, inputs) {
  const eps  = parseFloat(inputs.eps)  || 0;
  const g3   = parseFloat(inputs.g3)   || 0;
  const g5   = parseFloat(inputs.g5)   || 0;
  const g10  = parseFloat(inputs.g10)  || 0;
  const div  = parseFloat(inputs.div)  || 0;
  const bvps = parseFloat(inputs.bvps) || 0;
  if (type === "growth") {
    const fv3  = g3  ? eps * (1 + g3/100)**3  : null;
    const fv5  = g5  ? eps * (1 + g5/100)**5  : null;
    const fv10 = g10 ? eps * (1 + g10/100)**10 : null;
    return { fv3, fv5, fv10 };
  }
  if (type === "dividend") return { fv: div > 0 ? div * 25 : null };
  if (type === "asset")    return { fv: bvps > 0 ? bvps * 0.8 : null };
  return {};
}

function PriceTag({ label, fv, price }) {
  if (!fv) return null;
  const pct = price ? ((price - fv) / fv * 100) : null;
  return (
    <div style={{display:"inline-flex",flexDirection:"column",alignItems:"center",
      background:"#080c18",border:"1px solid #2a3a58",borderRadius:10,padding:"10px 16px",minWidth:110}}>
      <div style={{fontSize:11,color:"#6a8ab8",marginBottom:4}}>{label}</div>
      <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:900,fontSize:22,color:"#f0b90b"}}>
        {fmt$(fv)}
      </div>
      {pct!=null&&<div style={{fontSize:11,color:pct>0?"#ff4757":"#00c853",marginTop:3}}>
        {pct>0?"高估 +":"低估 "}{Math.abs(pct).toFixed(1)}%
      </div>}
    </div>
  );
}

// ── 估值燈號 ──────────────────────────────────────────────────────────────
function calcValLight(stock) {
  const saved = loadFairData()[stock.ticker];
  if (!saved || !saved.type) return null;
  const price = stock.price || 0;
  if (!price) return null;
  const type = saved.type;
  if (type === "growth") {
    const eps = parseFloat(saved.eps) || 0;
    const fvs = [
      saved.g3  ? eps * (1 + parseFloat(saved.g3)/100)**3   : null,
      saved.g5  ? eps * (1 + parseFloat(saved.g5)/100)**5   : null,
      saved.g10 ? eps * (1 + parseFloat(saved.g10)/100)**10 : null,
    ].filter(v => v && v > 0);
    if (!fvs.length) return null;
    const minFV = Math.min(...fvs), maxFV = Math.max(...fvs);
    if (price < minFV)  return "green";
    if (price <= maxFV) return "yellow";
    return "red";
  }
  if (type === "dividend") {
    const div = parseFloat(saved.div) || 0;
    if (!div) return null;
    const fv = div * 25;
    if (price < fv)        return "green";
    if (price <= fv * 1.1) return "yellow";
    return "red";
  }
  if (type === "asset") {
    const bvps = parseFloat(saved.bvps) || 0;
    if (!bvps) return null;
    if (price < bvps * 0.8)  return "green";
    if (price <= bvps * 1.2) return "yellow";
    return "red";
  }
  return null;
}
const VAL_LIGHT_CFG = {
  green:  { emoji:"🟢", label:"低估" },
  yellow: { emoji:"🟡", label:"合理" },
  red:    { emoji:"🔴", label:"高估" },
};
function ValLight({ stock }) {
  const light = calcValLight(stock);
  if (!light) return null;
  const { emoji, label } = VAL_LIGHT_CFG[light];
  return (
    <div title={`估值：${label}`} style={{fontSize:18,lineHeight:1,flexShrink:0}}>
      {emoji}
    </div>
  );
}

    if (!stock.summary || translated) return;
    setTranslating(true);
    try {
      const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=en&tl=zh-TW&dt=t&q=${encodeURIComponent(stock.summary)}`;
      const r = await fetch(url);
      const j = await r.json();
      setTranslated(j[0].map(s=>s[0]).join(""));
    } catch { setTranslated("（翻譯失敗，請查看原文）"); }
    finally { setTranslating(false); }
  };

  useEffect(()=>{ if(stock.summary) translate(); }, [stock.ticker]);

  const toggleMoat = id => setMoats(p => p.includes(id) ? p.filter(x=>x!==id) : [...p,id]);

  return (
    <div onClick={onClose} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.88)",
      zIndex:500,display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
      <div onClick={e=>e.stopPropagation()} style={{background:"#0d1120",border:"1px solid #1e2840",
        borderRadius:16,width:"100%",maxWidth:520,maxHeight:"90vh",overflowY:"auto"}} className="fade">

        {/* 股票 Header */}
        <div style={{padding:"20px 24px 0",borderBottom:"1px solid #1e2840"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}>
            <div>
              <div style={{display:"flex",alignItems:"center",gap:10}}>
                <span style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:900,fontSize:28,
                  color:"#ffffff"}}>{stock.ticker.replace(".TW","").replace(".TWO","")}</span>
                <button className="watch-btn" onClick={()=>onWatchToggle(stock.ticker)}
                  style={{background:isWatch?"#f0b90b18":"none",border:`1.5px solid ${isWatch?"#f0b90b":"#2a3a58"}`,
                    borderRadius:7,padding:"4px 10px",color:isWatch?"#f0b90b":"#4a5a7a",fontSize:13,cursor:"pointer"}}>
                  {isWatch ? "★ 已追蹤" : "☆ 加入觀察"}
                </button>
              </div>
              <div style={{color:"#c8d8f0",fontSize:16,fontWeight:500,marginBottom:6}}>{stock.name}</div>
              <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                <span style={{fontSize:12,color:"#f0b90b",background:"#f0b90b15",padding:"2px 8px",borderRadius:4}}>{stock.sector}</span>
                <span style={{fontSize:12,color:"#6a8ab8"}}>{stock.industry}</span>
              </div>
            </div>
            <button onClick={onClose} style={{background:"none",border:"none",color:"#4a5a7a",fontSize:22,cursor:"pointer",padding:4}}>✕</button>
          </div>
          <div style={{display:"flex",gap:20,marginBottom:14,flexWrap:"wrap"}}>
            {[["市值",fmtCap(stock.market_cap,market)],["現價",stock.price?`$${stock.price}`:"N/A"],
              ["EPS",stock.eps_current?`$${stock.eps_current}`:"N/A"],
              ["3年EPS成長",stock.eps_g3!=null?`${stock.eps_g3}%`:"N/A"],
            ].map(([k,v])=>(
              <div key={k}>
                <div style={{fontSize:11,color:"#4a5a7a"}}>{k}</div>
                <div style={{fontSize:14,color:"#c8d8f0",fontWeight:500}}>{v}</div>
              </div>
            ))}
          </div>

          {/* Tabs */}
          <div style={{display:"flex",gap:0}}>
            {[["score","財務評分"],["moat","護城河"],["fair","合理價"],["info","公司簡介"]].map(([id,lb])=>(
              <button key={id} className={`tab-btn ${activeTab===id?"active":""}`}
                onClick={()=>setActiveTab(id)}>{lb}</button>
            ))}
          </div>
        </div>

        <div style={{padding:"20px 24px"}}>

          {/* 財務評分 Tab */}
          {activeTab==="score" && (
            <div>
              <div style={{fontSize:13,color:"#8899bb",marginBottom:12}}>財務指標　{stock.fin_score}/6 分</div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                {Object.entries(stock.scores||{}).map(([k,v])=>(
                  <div key={k} style={{display:"flex",alignItems:"center",gap:8,padding:"9px 12px",
                    background:"#080c18",borderRadius:8,border:`1px solid ${v?"#00c85330":"#1e2840"}`}}>
                    <div style={{width:24,height:24,borderRadius:5,background:v?"#00c85322":"#ff475722",
                      border:`1.5px solid ${v?"#00c853":"#ff4757"}`,display:"flex",alignItems:"center",
                      justifyContent:"center",flexShrink:0}}>
                      <span style={{color:v?"#00c853":"#ff4757",fontSize:14,fontWeight:700}}>{v?"✓":"✗"}</span>
                    </div>
                    <div>
                      <div style={{fontSize:13,color:"#c8d8f0",fontWeight:500}}>{METRIC_LABELS[k]}</div>
                      <div style={{fontSize:11,color:"#5a6a8a",marginTop:1}}>{stock.details?.[k]}</div>
                    </div>
                  </div>
                ))}
              </div>
              {(stock.fcf_conv_txt || stock.gm_txt || stock.pe_txt) && (
                <div style={{marginTop:14}}>
                  <div style={{fontSize:12,color:"#5a6a8a",marginBottom:8}}>── 護城河量化指標（參考）──</div>
                  <div style={{display:"flex",flexDirection:"column",gap:6}}>
                    {stock.fcf_conv_txt && stock.fcf_conv_txt !== "N/A" && (
                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",
                        padding:"8px 12px",background:"#080c18",borderRadius:8,border:"1px solid #1e2840"}}>
                        <div>
                          <div style={{fontSize:12,color:"#8899bb"}}>💰 FCF 轉換率</div>
                          <div style={{fontSize:11,color:"#4a5a7a",marginTop:1}}>淨利轉為現金的能力</div>
                        </div>
                        <div style={{fontSize:13,fontWeight:600,textAlign:"right",
                          color:stock.fcf_conv>=1?"#00c853":stock.fcf_conv>=0.7?"#f0b90b":"#ff4757"}}>
                          {stock.fcf_conv_txt}
                        </div>
                      </div>
                    )}
                    {stock.gm_txt && stock.gm_txt !== "N/A" && (
                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",
                        padding:"8px 12px",background:"#080c18",borderRadius:8,border:"1px solid #1e2840"}}>
                        <div>
                          <div style={{fontSize:12,color:"#8899bb"}}>📊 毛利率穩定性</div>
                          <div style={{fontSize:11,color:"#4a5a7a",marginTop:1}}>σ 越小 = 定價能力越強</div>
                        </div>
                        <div style={{fontSize:13,fontWeight:600,textAlign:"right",
                          color:stock.std_gm<3?"#00c853":stock.std_gm<7?"#f0b90b":"#ff4757"}}>
                          {stock.gm_txt}
                        </div>
                      </div>
                    )}
                    {stock.pe_txt && stock.pe_txt !== "N/A" && (
                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",
                        padding:"8px 12px",background:"#080c18",borderRadius:8,border:"1px solid #1e2840"}}>
                        <div>
                          <div style={{fontSize:12,color:"#8899bb"}}>📈 估值評估</div>
                          <div style={{fontSize:11,color:"#4a5a7a",marginTop:1}}>PEG &lt; 1 通常為低估</div>
                        </div>
                        <div style={{fontSize:13,fontWeight:600,textAlign:"right",
                          color:stock.peg&&stock.peg<1?"#00c853":stock.peg&&stock.peg<2?"#f0b90b":"#ff4757"}}>
                          {stock.pe_txt}
                        </div>
                      </div>
                    )}
                  </div>
                </div>
              )}
            </div>
          )}

          {/* 護城河 Tab */}
          {activeTab==="moat" && (
            <div>
              <div style={{fontSize:13,color:"#8899bb",marginBottom:12}}>勾選符合的護城河類型</div>
              <div style={{display:"flex",flexWrap:"wrap",gap:7,marginBottom:14}}>
                {MOAT_TYPES.map(m=>(
                  <button key={m.id} onClick={()=>toggleMoat(m.id)}
                    style={{background:moats.includes(m.id)?"#f0b90b18":"transparent",
                      border:`1.5px solid ${moats.includes(m.id)?"#f0b90b":"#2a3a58"}`,
                      borderRadius:8,padding:"7px 13px",
                      color:moats.includes(m.id)?"#f0b90b":"#6a8ab8",
                      fontSize:13,fontWeight:500,cursor:"pointer",transition:"all 0.2s"}}>
                    {m.icon} {m.label}
                  </button>
                ))}
              </div>
              <div style={{display:"flex",gap:8,marginBottom:14}}>
                {[0,1,2,3].map(v=>(
                  <button key={v} onClick={()=>setMoatScore(v)}
                    style={{flex:1,padding:"12px 0",background:moatScore===v?MOAT_COLORS[v]+"25":"#080c18",
                      border:`2px solid ${moatScore===v?MOAT_COLORS[v]:"#1e2840"}`,borderRadius:8,
                      color:moatScore===v?MOAT_COLORS[v]:"#4a5a7a",
                      fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,fontSize:22,
                      cursor:"pointer",transition:"all 0.2s"}}>
                    {v}
                    <div style={{fontSize:11,fontFamily:"'Noto Sans TC',sans-serif",fontWeight:400,
                      marginTop:2,color:moatScore===v?MOAT_COLORS[v]+"cc":"#3a4a6a"}}>{MOAT_LABELS[v]}</div>
                  </button>
                ))}
              </div>
              <button onClick={()=>{onMoatUpdate(stock.ticker,moatScore,moats);setMoatSaved(true);setTimeout(()=>setMoatSaved(false),2500);}}
                style={{width:"100%",padding:"13px 0",
                  background:moatSaved?"#00c853":"linear-gradient(135deg,#f0b90b,#d4941a)",
                  border:"none",borderRadius:8,color:"#080c18",fontWeight:700,fontSize:15,
                  cursor:"pointer",transition:"background 0.3s"}}>
                {moatSaved ? "✓ 已儲存！" : "儲存護城河評分"}
              </button>
            </div>
          )}

          {/* 合理價 Tab */}
          {activeTab==="fair" && <FairValueCalc stock={stock} />}

          {/* 公司簡介 Tab */}
          {activeTab==="info" && (
            <div>
              <div style={{fontSize:13,color:"#8899bb",marginBottom:10}}>公司簡介</div>
              {translating && <div style={{color:"#4a5a7a",fontSize:13}}>翻譯中...</div>}
              {translated && (
                <div style={{fontSize:14,color:"#c8d8f0",lineHeight:1.8,marginBottom:12,
                  background:"#080c18",padding:"12px 14px",borderRadius:8}}>{translated}</div>
              )}
              {stock.summary && (
                <div style={{fontSize:12,color:"#5a6a8a",lineHeight:1.8}}>{stock.summary}</div>
              )}
              <a href={sbUrl} target="_blank" rel="noreferrer"
                style={{display:"inline-block",marginTop:12,fontSize:13,color:"#4a8aff"}}>
                在 StockBoss 查看更多 ↗
              </a>
            </div>
          )}

        </div>
      </div>
    </div>
  );
}

// ── 主 App ────────────────────────────────────────────────────────────────
function App() {
  const [market,setMarket]       = useState("TW");
  const [data,setData]           = useState(null);
  const [dataCache,setDataCache] = useState({TW:null,US:null}); // 快取兩個市場
  const [loading,setLoading]     = useState(false);
  const [error,setError]         = useState("");
  const [useDemo,setUseDemo]     = useState(false);
  const [selected,setSelected]   = useState(null);
  const [moatMap,setMoatMap]     = useState({});
  const [filterMin,setFilterMin] = useState(4);
  const [sortBy,setSortBy]       = useState("fin_score");
  const [search,setSearch]       = useState("");
  const [sectorFilter,setSectorFilter] = useState("全部");
  const [mainTab,setMainTab]       = useState("screen");
  const [watchlist,setWatchlist]   = useState(()=>loadWatchlist());
  const [session,setSession]       = useState(()=>loadSession());
  const [showAccount,setShowAccount] = useState(false);

  const toggleWatch = ticker => {
    setWatchlist(prev=>{
      const next=prev.includes(ticker)?prev.filter(t=>t!==ticker):[...prev,ticker];
      saveWatchlist(next);
      return next;
    });
  };

  const handleLogin = (sess, wl, fv) => {
    setSession(sess);
    saveSession(sess);
    if (wl && wl.length > 0) { setWatchlist(wl); saveWatchlist(wl); }
    if (fv) { try { localStorage.setItem("moatscan_fairval_v1", JSON.stringify(fv)); } catch {} }
  };

  const handleLogout = () => {
    setSession(null);
    saveSession(null);
  };

  const load = async(mkt,demo)=>{
    setLoading(true);setError("");setData(null);
    if(demo){
      await new Promise(r=>setTimeout(r,400));
      const d=DEMO_DATA[mkt];
      setData(d);
      setDataCache(p=>({...p,[mkt]:d}));
      // 順帶載入另一市場 demo 資料
      const other=mkt==="TW"?"US":"TW";
      if(DEMO_DATA[other]) setDataCache(p=>({...p,[other]:DEMO_DATA[other]}));
      setLoading(false);return;
    }
    try{
      const res=await fetch(DATA_URLS[mkt]+"?t="+Date.now());
      if(!res.ok)throw new Error("HTTP "+res.status);
      const d=await res.json();
      setData(d);
      setDataCache(p=>({...p,[mkt]:d}));
    }catch(e){setError(e.message);}finally{setLoading(false);}
    // 背景載入另一市場（不影響主畫面 loading）
    const other=mkt==="TW"?"US":"TW";
    try{
      const res2=await fetch(DATA_URLS[other]+"?t="+Date.now());
      if(res2.ok){ const d2=await res2.json(); setDataCache(p=>({...p,[other]:d2})); }
    }catch{}
  };
  useEffect(()=>{load(market,useDemo);},[market,useDemo]);

  const enriched = useMemo(()=>(data?.results||[]).map(r=>({
    ...r,
    moat_score: moatMap[r.ticker]?.score??r.moat_score??0,
    total_score:r.fin_score+(moatMap[r.ticker]?.score??r.moat_score??0),
  })),[data,moatMap]);

  // 兩個市場的完整資料（觀察清單用）
  const twEnriched = useMemo(()=>(dataCache.TW?.results||[]).map(r=>({
    ...r, moat_score:moatMap[r.ticker]?.score??r.moat_score??0,
    total_score:r.fin_score+(moatMap[r.ticker]?.score??r.moat_score??0),
  })),[dataCache.TW,moatMap]);
  const usEnriched = useMemo(()=>(dataCache.US?.results||[]).map(r=>({
    ...r, moat_score:moatMap[r.ticker]?.score??r.moat_score??0,
    total_score:r.fin_score+(moatMap[r.ticker]?.score??r.moat_score??0),
  })),[dataCache.US,moatMap]);

  const sectors = useMemo(()=>["全部",...new Set(enriched.map(r=>r.sector).filter(Boolean))],[enriched]);

  const filtered = useMemo(()=>{
    let list=enriched.filter(r=>r.fin_score>=filterMin);
    if(sectorFilter!=="全部")list=list.filter(r=>r.sector===sectorFilter);
    if(search)list=list.filter(r=>r.ticker.toLowerCase().includes(search.toLowerCase())||r.name?.toLowerCase().includes(search.toLowerCase()));
    return [...list].sort((a,b)=>b[sortBy]-a[sortBy]);
  },[enriched,filterMin,sectorFilter,search,sortBy]);

  const qualified=filtered.filter(r=>r.total_score>=7);
  const onMoatUpdate=(ticker,score,types)=>setMoatMap(p=>({...p,[ticker]:{score,types}}));

  const statItems=[
    {label:"掃描總數",val:data?.total||0,color:"#e8f0ff"},
    {label:"財務4分↑",val:enriched.filter(r=>r.fin_score>=4).length,color:"#ff8c42"},
    {label:"財務5分↑",val:enriched.filter(r=>r.fin_score>=5).length,color:"#ffd600"},
    {label:"財務6分", val:enriched.filter(r=>r.fin_score===6).length,color:"#00c853"},
    {label:"達標(≥7)", val:qualified.length,color:"#00c853"},
  ];

  return (
    <div style={{minHeight:"100vh",background:"#080c18"}}>
      {/* Header */}
      <div style={{borderBottom:"1px solid #1a2540",background:"#0a0e1c",padding:"0 20px",display:"flex",alignItems:"center",justifyContent:"space-between",height:56,flexWrap:"wrap",gap:8,position:"sticky",top:0,zIndex:50}}>
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          <div style={{width:30,height:30,background:"linear-gradient(135deg,#f0b90b,#d4941a)",borderRadius:7,display:"flex",alignItems:"center",justifyContent:"center"}}>
            <span style={{color:"#080c18",fontSize:15,fontWeight:700}}>⬡</span>
          </div>
          <span style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:900,fontSize:20,letterSpacing:"0.12em",color:"#ffffff"}}>
            MOAT<span style={{color:"#f0b90b"}}>SCAN</span>
          </span>
          <span style={{fontSize:12,color:"#4a5a7a"}}>全市場選股篩選</span>
        </div>
        <div style={{display:"flex",gap:10,alignItems:"center"}}>
          <label style={{fontSize:13,color:"#6a8ab8",display:"flex",alignItems:"center",gap:6,cursor:"pointer"}}>
            <input type="checkbox" checked={useDemo} onChange={e=>setUseDemo(e.target.checked)} style={{accentColor:"#f0b90b",width:14,height:14}} />
            示範資料
          </label>
          {["TW","US"].map(m=>(
            <button key={m} onClick={()=>setMarket(m)}
              style={{padding:"7px 18px",background:market===m?"linear-gradient(135deg,#f0b90b,#d4941a)":"none",border:`1px solid ${market===m?"transparent":"#2a3a58"}`,borderRadius:7,color:market===m?"#080c18":"#6a8ab8",fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,fontSize:15,transition:"all 0.2s"}}>
              {m==="TW"?"🇹🇼 台股":"🇺🇸 美股"}
            </button>
          ))}
          {/* 帳號按鈕 */}
          <button onClick={()=>setShowAccount(true)} title={session?"雲端帳號："+session.nickname:"雲端帳號"}
            style={{height:34,borderRadius:8,border:`2px solid ${session?"#f0b90b":"#8899bb"}`,
              background:session?"#f0b90b18":"#1a2540",cursor:"pointer",display:"flex",alignItems:"center",
              gap:6,padding:"0 12px",flexShrink:0,transition:"all 0.2s"}}>
            <span style={{fontSize:14}}>☁️</span>
            <span style={{fontSize:13,fontWeight:600,color:session?"#f0b90b":"#c8d8f0"}}>
              {session ? session.nickname : "雲端帳號"}
            </span>
          </button>
        </div>
      </div>

      <div style={{maxWidth:960,margin:"0 auto",padding:"24px 16px"}}>

        {/* 主分頁 */}
        <div style={{borderBottom:"1px solid #1e2840",marginBottom:20,display:"flex",gap:4}}>
          <button className={`tab-btn ${mainTab==="screen"?"active":""}`} onClick={()=>setMainTab("screen")} style={{fontSize:15}}>
            📊 選股篩選
          </button>
          <button className={`tab-btn ${mainTab==="watch"?"active":""}`} onClick={()=>setMainTab("watch")} style={{fontSize:15}}>
            ★ 觀察清單
            {watchlist.length>0&&<span style={{marginLeft:6,background:"#f0b90b",color:"#080c18",borderRadius:10,padding:"1px 7px",fontSize:11,fontWeight:700}}>{watchlist.length}</span>}
          </button>
        </div>

        {/* 觀察清單頁 */}
        {mainTab==="watch" && (
          <WatchlistPage watchlist={watchlist} twStocks={twEnriched} usStocks={usEnriched} onSelect={setSelected} onRemove={toggleWatch} />
        )}

        {/* 選股篩選頁 */}
        {mainTab==="screen" && (
          <>
            {data && (
              <div style={{display:"flex",gap:10,marginBottom:20,flexWrap:"wrap"}}>
                {statItems.map(item=>(
                  <div key={item.label} style={{background:"#0d1120",border:"1px solid #1e2a40",borderRadius:10,padding:"10px 18px",textAlign:"center",flex:"1 0 auto"}}>
                    <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:900,fontSize:26,color:item.color}}>{item.val}</div>
                    <div style={{fontSize:12,color:"#6a8ab8",marginTop:2}}>{item.label}</div>
                  </div>
                ))}
                <div style={{fontSize:12,color:"#3a4a6a",alignSelf:"center",marginLeft:"auto"}}>更新：{data.updated}</div>
              </div>
            )}

            {data && <SectorHeatmap data={enriched} />}

            <div style={{display:"flex",gap:8,marginBottom:18,flexWrap:"wrap"}}>
              <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍 搜尋股票代號或公司名稱"
                style={{flex:"1 1 200px",background:"#0d1120",border:"1px solid #1e2a40",borderRadius:8,padding:"10px 14px",color:"#e8f0ff",fontSize:14}} />
              <select value={sectorFilter} onChange={e=>setSectorFilter(e.target.value)}
                style={{background:"#0d1120",border:"1px solid #1e2a40",borderRadius:8,padding:"10px 14px",color:"#e8f0ff",fontSize:14,minWidth:140}}>
                {sectors.map(s=><option key={s}>{s}</option>)}
              </select>
              <select value={filterMin} onChange={e=>setFilterMin(Number(e.target.value))}
                style={{background:"#0d1120",border:"1px solid #1e2a40",borderRadius:8,padding:"10px 14px",color:"#e8f0ff",fontSize:14}}>
                <option value={4}>財務 ≥ 4分</option>
                <option value={5}>財務 ≥ 5分</option>
                <option value={6}>財務 = 6分</option>
              </select>
              <select value={sortBy} onChange={e=>setSortBy(e.target.value)}
                style={{background:"#0d1120",border:"1px solid #1e2a40",borderRadius:8,padding:"10px 14px",color:"#e8f0ff",fontSize:14}}>
                <option value="fin_score">財務分數排序</option>
                <option value="total_score">總分排序</option>
                <option value="market_cap">市值排序</option>
              </select>
            </div>

            {loading && (
              <div style={{textAlign:"center",padding:"70px 0",color:"#4a5a7a"}}>
                <div className="spin" style={{width:36,height:36,border:"3px solid #1e2840",borderTopColor:"#f0b90b",borderRadius:"50%",margin:"0 auto 16px"}} />
                <div style={{fontSize:14}}>載入資料中，請稍候...</div>
              </div>
            )}
            {error && (
              <div style={{background:"#ff475714",border:"1px solid #ff475740",borderRadius:10,padding:18,color:"#ff7070",fontSize:14,marginBottom:16,lineHeight:1.8}}>
                ⚠ 資料載入失敗：{error}<br/>
                <span style={{fontSize:12,color:"#ff475780"}}>請勾選「示範資料」體驗，或等 GitHub Actions 跑完後再試</span>
              </div>
            )}
            {!loading && data && (
              <div className="fade">
                <div style={{fontSize:13,color:"#5a7a9a",marginBottom:14}}>
                  顯示 <span style={{color:"#e8f0ff",fontWeight:600}}>{filtered.length}</span> 支
                </div>
                {filtered.map(stock=>(
                  <StockRow key={stock.ticker} stock={stock} market={market} onSelect={setSelected} isWatched={watchlist.includes(stock.ticker)} />
                ))}
                {filtered.length===0&&<div style={{textAlign:"center",padding:"50px 0",color:"#3a4a6a",fontSize:14}}>無符合條件的股票</div>}
              </div>
            )}
          </>
        )}

        <div style={{marginTop:36,textAlign:"center",fontSize:12,color:"#2a3a58",lineHeight:1.8}}>
          MOATSCAN · 資料來源：yfinance / Yahoo Finance · 合理價計算僅供參考，不構成投資建議
        </div>
      </div>

      {showAccount && (
        <AccountModal
          session={session}
          onClose={()=>setShowAccount(false)}
          onLogin={handleLogin}
          onLogout={handleLogout}
        />
      )}
      {selected && (
        <CompanyModal stock={selected} market={market} onClose={()=>setSelected(null)}
          onMoatUpdate={onMoatUpdate} watchlist={watchlist} onWatchToggle={toggleWatch} />
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
